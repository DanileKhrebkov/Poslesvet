{% extends "base.html" %}

{% block app_content %}
<div class="content-block">
    <h1>{{ title }}</h1>
    <div class="row">
        <div class="col-md-6">
            <img src="{{ url_for('static', filename=image_url) }}" alt="{{ title }}" class="img-fluid page-image">
        </div>
        <div class="col-md-6">
            <p>{{ content1 }}</p>
            <p>{{ content2 }}</p>
        </div>
    </div>
    <a href="{{ url_for('index') }}" class="btn btn-secondary mt-3">На главную</a>
</div>
{% endblock %}
